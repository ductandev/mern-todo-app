- name: Triển khai ứng dụng MERN trên VPS
  hosts: danh_sach_host
  become: true
  # Tắt chế độ interactive của apt khi cài package.
  # Mặc định apt có thể hỏi timezone, keyboard layout... → script bị treo chờ nhập.
  # noninteractive = tự dùng giá trị mặc định, không hỏi gì cả.
  environment:
    DEBIAN_FRONTEND: noninteractive
  tasks:
    - name: Set timezone Asia/Ho_Chi_Minh
      timezone:
        name: Asia/Ho_Chi_Minh

    - name: Cài đặt docker
      apt:
        name: docker.io
        state: present

    - name: Cài đặt docker-compose
      shell: curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose

    - name: Cấp quyền thực thi cho docker-compose
      shell: chmod 700 /usr/local/bin/docker-compose

    - name: Clone source từ Git
      git:
        repo: "https://{{ github_token }}@github.com/ductandev/mern-todo-app.git"
        dest: /root/mern-todo-app
        version: main

    - name: Copy file .env cho backend/docker-compose lên VPS
      copy:
        src: /root/.env      # Lưu ý: /root ở đây là đường dẫn trong Docker container (do tôi mount ./:/root), không phải máy Windows.
        dest: /root/mern-todo-app/.env

    - name: Copy file .env cho frontend lên VPS
      copy:
        src: /root/frontend/.env
        dest: /root/mern-todo-app/frontend/.env

    - name: deploy full web
      shell: cd /root/mern-todo-app && docker-compose up -d

    - name: Chạy Jenkins
      shell: docker run -d --name jenkins -p 8080:8080 -p 50000:50000 jenkins/jenkins:lts

    - name: Chạy Grafana
      shell: docker run -d --name=grafana -p 3000:3000 --network mern-todo-app_default grafana/grafana:12.1

    - name: Chạy Prometheus
      shell: >
        docker run --name prometheus -d -p 9090:9090
        --network mern-todo-app_default
        -v /root/mern-todo-app/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        prom/prometheus

    - name: Chạy Node Exporter
      shell: >
        docker run -d --name host-node-exporter
        --net="mern-todo-app_default"
        -p 9100:9100
        prom/node-exporter

    - name: Chạy MongoDB Exporter
      shell: >
        docker run -d --name mongodb-exporter
        --net="mern-todo-app_default"
        -p 9216:9216
        percona/mongodb_exporter:0.40
        --mongodb.uri="mongodb://admin:Test%401234@mongo:27017/admin"
        --collect-all

    - name: Tạo volume cho Portainer
      shell: docker volume create portainer_data

    - name: Chạy Portainer
      shell: >
        docker run -d
        -p 8000:8000 -p 9000:9000
        --name=portainer
        --restart=always
        -v /var/run/docker.sock:/var/run/docker.sock
        -v portainer_data:/data
        portainer/portainer



