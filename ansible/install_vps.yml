---
- name: Triển khai ứng dụng MERN Todo + platform trên VPS DigitalOcean
  hosts: danh_sach_host
  become: true
  # noninteractive = apt tự dùng giá trị mặc định, không hỏi timezone/keyboard
  environment:
    DEBIAN_FRONTEND: noninteractive

  vars:
    # Repo public — clone qua HTTPS, KHÔNG nhúng token vào URL
    # (token trong URL sẽ bị lưu lại trong .git/config trên VPS).
    project_repo_url: https://github.com/ductandev/mern-todo-app.git
    project_repo_version: main
    app_dir: /root/mern-todo-app
    app_env_file: "{{ app_dir }}/.env"
    monitoring_dir: "{{ app_dir }}/monitoring"
    ci_cd_dir: "{{ app_dir }}/ci-cd"
    portainer_dir: "{{ app_dir }}/portainer"

    # Các port UFW cho phép (exporter và MongoDB không mở).
    # Lưu ý: port do Docker publish sẽ bypass UFW (Docker ghi thẳng iptables),
    # lớp chặn thật sự từ ngoài vào là DigitalOcean cloud firewall (terraform/firewall.tf);
    # UFW là defense-in-depth cho các service chạy trực tiếp trên host (vd: sshd).
    ufw_allowed_ports:
      - "22"    # SSH
      - "80"    # NPM HTTP
      - "81"    # NPM admin
      - "443"   # NPM HTTPS
      - "3000"  # Grafana
      - "5173"  # Frontend direct
      - "8080"  # Jenkins
      - "8300"  # Backend direct
      - "9000"  # Portainer
      - "9090"  # Prometheus
      - "9093"  # Alertmanager

    # Alerting qua email — đọc từ biến môi trường trên máy chạy Ansible
    # (bash.sh export từ .env). Bỏ trống = Alertmanager không gửi email.
    alert_email: "{{ lookup('env', 'ALERTMANAGER_EMAIL') | default('', true) }}"
    alert_smtp_password: "{{ lookup('env', 'ALERTMANAGER_SMTP_PASSWORD') | default('', true) }}"
    alert_smtp_smarthost: "smtp.gmail.com:587"

  handlers:
    - name: restart fail2ban
      systemd:
        name: fail2ban
        state: restarted

    - name: restart sshd
      systemd:
        name: ssh
        state: restarted

  tasks:
    - name: Cấu hình cơ bản (timezone, swap)
      import_tasks: tasks/base.yml

    - name: Cài đặt Docker + Docker Compose
      import_tasks: tasks/docker.yml

    - name: Bảo mật host (UFW, Fail2Ban, SSH hardening)
      import_tasks: tasks/security.yml

    - name: Clone source code
      import_tasks: tasks/source_code.yml

    - name: Deploy application stack
      import_tasks: tasks/app.yml

    - name: Deploy monitoring stack
      import_tasks: tasks/monitoring.yml

    - name: Deploy Jenkins (CI/CD)
      import_tasks: tasks/ci_cd.yml

    - name: Deploy Portainer
      import_tasks: tasks/portainer.yml

    - name: Kiểm tra kết quả triển khai
      import_tasks: tasks/verify.yml
