# Lưu ý: khi thư mục bị mount world-writable (docker mount từ Windows),
# Ansible sẽ từ chối đọc file này — bash.sh set thêm các giá trị tương đương
# qua biến môi trường (ANSIBLE_HOST_KEY_CHECKING=False).
[defaults]
host_key_checking = False
retry_files_enabled = False
timeout = 60

[ssh_connection]
ssh_args = -o ControlMaster=no -o ControlPersist=no -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30
pipelining = True
