---
- name: Cảnh báo khi chưa cấu hình SMTP cho Alertmanager
  debug:
    msg: "ALERTMANAGER_SMTP_PASSWORD chưa được set — monitoring vẫn deploy nhưng Alertmanager sẽ không gửi email."
  when: alert_smtp_password | length == 0

- name: Render cấu hình Alertmanager (chứa SMTP password, không commit lên git)
  template:
    src: templates/alertmanager.yml.j2
    dest: "{{ monitoring_dir }}/alertmanager/alertmanager.yml"
    # UID 65534 (nobody) là user mặc định của container prom/alertmanager
    owner: "65534"
    group: "65534"
    mode: "0600"
  no_log: true

- name: Start monitoring stack (prometheus, alertmanager, grafana, exporters)
  command:
    argv:
      - docker
      - compose
      - --env-file
      - "{{ app_env_file }}"
      - -f
      - docker-compose.monitoring.yml
      - up
      - -d
      - --remove-orphans
    chdir: "{{ monitoring_dir }}"
  register: monitoring_up
  changed_when: >
    'Created' in monitoring_up.stderr or
    'Started' in monitoring_up.stderr or
    'Recreated' in monitoring_up.stderr
