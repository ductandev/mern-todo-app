version: "368"
services:
  mongo:
    container_name: mongo
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-express:
    container_name: backend-express
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mongo:
        # đợi MongoDB sẵn sàng accept connection rồi Backend mới start. nếu ko có điều kiện này, Backend có thể start trước → connect fail → restart loop → may rủi.
        condition: service_healthy
    ports:
      - 8300:8386

  frontend-react:
    container_name: frontend-react
    build: ./frontend
    restart: unless-stopped
    ports:
      - 5173:80

  nginx:
    image: "jc21/nginx-proxy-manager:latest"
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - backend-express
      - frontend-react

volumes:
  mongo-data:
