version: "3"
services:
  frontend-react:
    container_name: frontend-react
    build: ./frontend
    ports:
      - 5173:80

  backend-express:
    container_name: backend-express
    build: ./backend
    ports:
      - 9090:9090

  nginx:
    image: "jc21/nginx-proxy-manager:latest"
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
