# Stack giám sát: Prometheus + Alertmanager + Grafana + exporters.
# Chạy bằng: docker compose --env-file ../.env -f docker-compose.monitoring.yml up -d
# (cần app stack chạy trước để network mern-network tồn tại)
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
      - mern-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      # alertmanager.yml do Ansible render từ template (chứa SMTP password)
      # nên KHÔNG commit file thật lên git.
      - ./alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: host-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring
      - mern-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb-exporter
    restart: unless-stopped
    command:
      # URI không chứa credential — user/password truyền qua env,
      # đọc từ .env gốc (không hardcode trong file này hay playbook).
      - "--mongodb.uri=mongodb://mongo:27017/admin"
      - "--compatible-mode"
      - "--collect-all"
    environment:
      MONGODB_USER: ${MONGO_USERNAME}
      MONGODB_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - monitoring
      - mern-network

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:

networks:
  monitoring:
    name: monitoring
    driver: bridge
  # Join network của app stack để scrape mongo
  mern-network:
    name: mern-network
    external: true
