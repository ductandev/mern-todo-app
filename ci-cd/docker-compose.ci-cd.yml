# Jenkins CD server.
# Chạy bằng: docker compose -f docker-compose.ci-cd.yml up -d
services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      # Persist toàn bộ config, credentials, job history của Jenkins —
      # trước đây chạy docker run không volume nên recreate là mất sạch.
      - jenkins-home:/var/jenkins_home
    networks:
      - ci-cd
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  jenkins-home:

networks:
  ci-cd:
    name: ci-cd
    driver: bridge
